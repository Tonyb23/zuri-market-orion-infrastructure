<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" viewBox="0 0 900 1020" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Arial, Helvetica, sans-serif">
<title>Zuri Market — End-to-End DevOps Architecture Diagram</title>
<desc>Three swim lane architecture diagram showing Developer Machine, CI/CD Layer, and Cloud Infrastructure with all components and directional data flows between them.</desc>

<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <!-- Color definitions -->
  <!-- Purple: fill=#EEEDFE stroke=#534AB7 text=#3C3489 subtitle=#534AB7 -->
  <!-- Teal:   fill=#E1F5EE stroke=#0F6E56 text=#085041 subtitle=#0F6E56 -->
  <!-- Coral:  fill=#FAECE7 stroke=#993C1D text=#712B13 subtitle=#993C1D -->
  <!-- Amber:  fill=#FAEEDA stroke=#854F0B text=#633806 subtitle=#854F0B -->
  <!-- Gray:   fill=#F1EFE8 stroke=#5F5E5A text=#444441 subtitle=#5F5E5A -->
  <!-- Green arrow: #0F6E56  Amber arrow: #854F0B -->
</defs>

<!-- White background -->
<rect width="900" height="1020" fill="#FFFFFF"/>

<!-- ═══════════════════════════════════════════════
     SWIM LANE 1 — DEVELOPER MACHINE
     ═══════════════════════════════════════════════ -->
<rect x="20" y="20" width="860" height="190" rx="12" fill="#F8F7F4" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="7 4"/>
<text x="38" y="44" font-size="11" font-weight="500" fill="#888780" letter-spacing="0.5">SWIM LANE 1 — DEVELOPER MACHINE</text>

<!-- Git repository -->
<rect x="44" y="58" width="190" height="60" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
<text x="139" y="84" text-anchor="middle" font-size="14" font-weight="500" fill="#3C3489">Git repository</text>
<text x="139" y="103" text-anchor="middle" font-size="12" fill="#534AB7">Frontend + backend source</text>

<!-- Local .env files -->
<rect x="260" y="58" width="175" height="60" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
<text x="347" y="84" text-anchor="middle" font-size="14" font-weight="500" fill="#444441">Local .env files</text>
<text x="347" y="103" text-anchor="middle" font-size="12" fill="#5F5E5A">Never committed to Git</text>

<!-- Docker Desktop -->
<rect x="462" y="58" width="175" height="60" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
<text x="549" y="84" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">Docker Desktop</text>
<text x="549" y="103" text-anchor="middle" font-size="12" fill="#0F6E56">Build + test locally</text>

<!-- k8s manifests -->
<rect x="662" y="58" width="130" height="60" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
<text x="727" y="82" text-anchor="middle" font-size="14" font-weight="500" fill="#3C3489">k8s manifests</text>
<text x="727" y="100" text-anchor="middle" font-size="12" fill="#534AB7">Committed to Git</text>

<!-- Arrow: Git repo → down (git push) -->
<line x1="139" y1="118" x2="139" y2="178" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text x="148" y="153" font-size="11" fill="#888780">git push to main</text>

<!-- Arrow: Docker Desktop → down -->
<line x1="549" y1="118" x2="549" y2="178" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text x="558" y="153" font-size="11" fill="#888780">image built locally</text>


<!-- ═══════════════════════════════════════════════
     SWIM LANE 2 — CI/CD LAYER (GITHUB)
     ═══════════════════════════════════════════════ -->
<rect x="20" y="198" width="860" height="320" rx="12" fill="#F8F7F4" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="7 4"/>
<text x="38" y="220" font-size="11" font-weight="500" fill="#888780" letter-spacing="0.5">SWIM LANE 2 — CI/CD LAYER (GITHUB)</text>

<!-- GitHub repository -->
<rect x="44" y="232" width="165" height="60" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
<text x="126" y="258" text-anchor="middle" font-size="14" font-weight="500" fill="#3C3489">GitHub repo</text>
<text x="126" y="277" text-anchor="middle" font-size="12" fill="#534AB7">Source + k8s manifests</text>

<!-- GitHub Actions -->
<rect x="44" y="326" width="165" height="60" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
<text x="126" y="352" text-anchor="middle" font-size="14" font-weight="500" fill="#3C3489">GitHub Actions</text>
<text x="126" y="371" text-anchor="middle" font-size="12" fill="#534AB7">Triggered on push</text>

<!-- Arrow: GitHub repo → GitHub Actions -->
<line x1="126" y1="292" x2="126" y2="326" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text x="134" y="313" font-size="11" fill="#888780">triggers</text>

<!-- Security scanning block -->
<rect x="236" y="232" width="195" height="155" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.8"/>
<text x="333" y="256" text-anchor="middle" font-size="14" font-weight="500" fill="#712B13">Security scanning</text>
<text x="333" y="276" text-anchor="middle" font-size="12" fill="#993C1D">npm audit — dependencies</text>
<text x="333" y="296" text-anchor="middle" font-size="12" fill="#993C1D">Trivy — Docker image</text>
<text x="333" y="316" text-anchor="middle" font-size="12" fill="#993C1D">tfsec / Checkov — IaC</text>
<text x="333" y="338" text-anchor="middle" font-size="12" fill="#993C1D">⛔ Blocks on CRITICAL</text>
<text x="333" y="356" text-anchor="middle" font-size="12" fill="#993C1D">findings</text>

<!-- GitHub Actions Secrets -->
<rect x="460" y="232" width="185" height="60" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
<text x="552" y="256" text-anchor="middle" font-size="14" font-weight="500" fill="#444441">GitHub Secrets</text>
<text x="552" y="275" text-anchor="middle" font-size="12" fill="#5F5E5A">DockerHub, AWS keys,</text>
<text x="552" y="305" text-anchor="middle" font-size="11" fill="#888780">kubeconfig, SSH key, EC2 IP</text>

<!-- DockerHub -->
<rect x="460" y="326" width="185" height="60" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
<text x="552" y="352" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">DockerHub</text>
<text x="552" y="371" text-anchor="middle" font-size="12" fill="#0F6E56">Tagged image store</text>

<!-- Arrow: GitHub Actions → Security scanning -->
<line x1="209" y1="356" x2="234" y2="320" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Arrow: GitHub Secrets → GitHub Actions (dashed, injects creds) -->
<path d="M460 262 L209 370" stroke="#888780" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)" fill="none"/>
<text x="320" y="298" text-anchor="middle" font-size="11" fill="#888780">injects creds</text>

<!-- Arrow: Security scanning → DockerHub (image push — solid green) -->
<line x1="431" y1="356" x2="458" y2="356" stroke="#0F6E56" stroke-width="2" marker-end="url(#arrow)"/>
<text x="444" y="346" text-anchor="middle" font-size="11" font-weight="500" fill="#0F6E56">image push</text>

<!-- Arrow: GitHub Actions → down to k3s (kubectl apply) -->
<line x1="126" y1="386" x2="126" y2="560" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text x="134" y="490" font-size="11" fill="#888780">apply manifests</text>

<!-- Arrow: DockerHub → down to k3s (solid green, kubectl apply) -->
<line x1="552" y1="386" x2="552" y2="560" stroke="#0F6E56" stroke-width="2" marker-end="url(#arrow)"/>
<text x="562" y="480" font-size="11" font-weight="500" fill="#0F6E56">kubectl apply</text>


<!-- ═══════════════════════════════════════════════
     SWIM LANE 3 — CLOUD INFRASTRUCTURE (AWS)
     ═══════════════════════════════════════════════ -->
<rect x="20" y="506" width="860" height="468" rx="12" fill="#F8F7F4" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="7 4"/>
<text x="38" y="528" font-size="11" font-weight="500" fill="#888780" letter-spacing="0.5">SWIM LANE 3 — CLOUD INFRASTRUCTURE (AWS)</text>

<!-- Terraform -->
<rect x="44" y="542" width="155" height="60" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.8"/>
<text x="121" y="568" text-anchor="middle" font-size="14" font-weight="500" fill="#712B13">Terraform</text>
<text x="121" y="587" text-anchor="middle" font-size="12" fill="#993C1D">Provisions all below</text>

<!-- S3 + DynamoDB remote state -->
<rect x="44" y="636" width="155" height="60" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
<text x="121" y="659" text-anchor="middle" font-size="14" font-weight="500" fill="#444441">S3 + DynamoDB</text>
<text x="121" y="678" text-anchor="middle" font-size="12" fill="#5F5E5A">Remote Terraform state</text>

<!-- Arrow: Terraform → S3 state -->
<line x1="121" y1="602" x2="121" y2="636" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text x="130" y="623" font-size="11" fill="#888780">stores state</text>

<!-- AWS IAM Role -->
<rect x="228" y="542" width="165" height="60" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
<text x="310" y="568" text-anchor="middle" font-size="14" font-weight="500" fill="#633806">AWS IAM role</text>
<text x="310" y="587" text-anchor="middle" font-size="12" fill="#854F0B">Grants Secrets access</text>

<!-- Arrow: Terraform → IAM role -->
<line x1="199" y1="572" x2="226" y2="572" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text x="212" y="563" text-anchor="middle" font-size="10" fill="#888780">provisions</text>

<!-- EC2 dashed container -->
<rect x="420" y="524" width="440" height="360" rx="12" fill="none" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="5 3"/>
<text x="436" y="546" font-size="12" font-weight="500" fill="#888780">AWS EC2 instance</text>

<!-- Arrow: Terraform → EC2 -->
<line x1="199" y1="586" x2="418" y2="586" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text x="308" y="578" text-anchor="middle" font-size="10" fill="#888780">provisions</text>

<!-- Arrow: IAM → EC2 -->
<line x1="393" y1="572" x2="418" y2="572" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<text x="405" y="563" text-anchor="middle" font-size="10" fill="#888780">attached</text>

<!-- k3s cluster label -->
<text x="620" y="568" text-anchor="middle" font-size="13" font-weight="500" fill="#5F5E5A">k3s cluster</text>

<!-- Deployment -->
<rect x="436" y="580" width="155" height="50" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
<text x="513" y="600" text-anchor="middle" font-size="13" font-weight="500" fill="#085041">Deployment</text>
<text x="513" y="618" text-anchor="middle" font-size="11" fill="#0F6E56">Frontend + backend pods</text>

<!-- Service -->
<rect x="436" y="648" width="155" height="50" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
<text x="513" y="668" text-anchor="middle" font-size="13" font-weight="500" fill="#085041">Service</text>
<text x="513" y="686" text-anchor="middle" font-size="11" fill="#0F6E56">Exposes pods :30080</text>

<!-- Kubernetes Secret -->
<rect x="436" y="716" width="155" height="50" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
<text x="513" y="736" text-anchor="middle" font-size="13" font-weight="500" fill="#633806">Kubernetes Secret</text>
<text x="513" y="754" text-anchor="middle" font-size="11" fill="#854F0B">Injects env vars to pods</text>

<!-- Arrows inside k3s -->
<line x1="513" y1="630" x2="513" y2="648" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
<line x1="513" y1="698" x2="513" y2="716" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

<!-- AWS Secrets Manager -->
<rect x="628" y="580" width="210" height="60" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
<text x="733" y="604" text-anchor="middle" font-size="13" font-weight="500" fill="#633806">AWS Secrets Manager</text>
<text x="733" y="622" text-anchor="middle" font-size="11" fill="#854F0B">API keys, store name</text>

<!-- DOTTED amber arrow: Secrets Manager → k8s Secret (secrets injected at runtime) -->
<path d="M733 640 L733 740 L593 740" stroke="#854F0B" stroke-width="1.8" stroke-dasharray="6 3" marker-end="url(#arrow)" fill="none"/>
<text x="696" y="700" text-anchor="middle" font-size="11" font-weight="500" fill="#854F0B">secrets injected</text>
<text x="696" y="715" text-anchor="middle" font-size="11" font-weight="500" fill="#854F0B">at runtime</text>

<!-- Arrow: IAM role → Secrets Manager (read permission, dashed) -->
<path d="M393 558 L628 598" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)" fill="none"/>
<text x="510" y="567" text-anchor="middle" font-size="10" fill="#888780">read permission</text>

<!-- Arrow: DockerHub → Deployment (k3s pulls image) - enters from top of EC2 -->
<path d="M552 560 L552 580 L591 580" stroke="#0F6E56" stroke-width="2" marker-end="url(#arrow)" fill="none"/>

<!-- Public URL box -->
<rect x="436" y="800" width="155" height="50" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
<text x="513" y="820" text-anchor="middle" font-size="13" font-weight="500" fill="#085041">Public URL</text>
<text x="513" y="838" text-anchor="middle" font-size="11" fill="#0F6E56">http://EC2-IP:30080</text>

<!-- Arrow: Service → Public URL -->
<line x1="513" y1="766" x2="513" y2="800" stroke="#0F6E56" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- ═══════════════════════════════════════════════
     LEGEND
     ═══════════════════════════════════════════════ -->
<text x="44" y="898" font-size="11" font-weight="500" fill="#888780">LEGEND</text>
<line x1="44" y1="918" x2="84" y2="918" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="92" y="922" font-size="11" fill="#444441">Trigger / data flow</text>
<line x1="240" y1="918" x2="280" y2="918" stroke="#0F6E56" stroke-width="2" marker-end="url(#arrow)"/>
<text x="288" y="922" font-size="11" fill="#444441">Image push / kubectl apply</text>
<line x1="490" y1="918" x2="530" y2="918" stroke="#854F0B" stroke-width="1.8" stroke-dasharray="6 3" marker-end="url(#arrow)"/>
<text x="538" y="922" font-size="11" fill="#444441">Secrets injected at runtime</text>
<line x1="44" y1="945" x2="84" y2="945" stroke="#888780" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text x="92" y="949" font-size="11" fill="#444441">Credential / permission flow (dashed)</text>
<rect x="240" y="934" width="14" height="14" rx="3" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
<text x="260" y="946" font-size="11" fill="#444441">Developer / pipeline components</text>
<rect x="490" y="934" width="14" height="14" rx="3" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
<text x="510" y="946" font-size="11" fill="#444441">Secrets / IAM</text>
<rect x="610" y="934" width="14" height="14" rx="3" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
<text x="630" y="946" font-size="11" fill="#444441">Kubernetes / runtime</text>

